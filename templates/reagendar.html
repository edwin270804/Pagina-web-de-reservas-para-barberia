<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reagendar Cita</title>

    <!-- FLATPICKR -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        body{
            background:#121212;
            color:white;
            font-family:sans-serif;
            text-align:center;
        }

        .card{
            max-width:400px;
            margin:80px auto;
            background:#1a1a1a;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.6);
        }

        h2{
            margin-bottom:20px;
            color:#c9a227;
        }

        p{
            color:#bbb;
            margin:5px 0;
        }

        strong{
            color:#fff;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:12px;

            border-radius:10px;
            border:1px solid #333;

            background:#111;
            color:#fff;

            font-size:15px;

            transition:0.3s;
        }

        input:focus{
            outline:none;
            border:1px solid #c9a227;
            box-shadow:0 0 8px rgba(201,162,39,0.5);
            transform:scale(1.02);
        }

        button{
            margin-top:20px;
            padding:14px;
            width:100%;

            background:linear-gradient(135deg,#c9a227,#f5d76e);
            border:none;
            border-radius:10px;

            font-weight:bold;
            font-size:15px;
            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px) scale(1.03);
            box-shadow:0 10px 25px rgba(201,162,39,0.5);
        }

        .info-box{
            background:#111;
            padding:15px;
            border-radius:10px;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Reagendar Cita 🔄</h2>

    <div class="info-box">
        <p><strong>Cliente:</strong> {{cita.nombre}}</p>
        <p><strong>Barbero:</strong> {{cita.barbero}}</p>
    </div>

    <div class="info-box">
        <p><strong>Fecha actual:</strong> {{cita.fecha}}</p>
        <p><strong>Hora actual:</strong> {{cita.hora}}</p>
    </div>

    <form method="POST" action="/confirmar_reagendado/{{token}}">

        <input type="text" id="fecha" name="fecha" placeholder="Selecciona nueva fecha" required>

        <input type="text" id="hora" name="hora" placeholder="Selecciona nueva hora" required>

        <button type="submit">
            Confirmar cambio ✅
        </button>

    </form>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<!-- IDIOMA ESPAÑOL -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
flatpickr("#fecha", {
    locale: "es",
    dateFormat: "Y-m-d",
    altInput : true,
    altFormat : "d/m/Y",
    minDate: "today",

    disable: [
        function(date) {
            return (date.getDay() === 0); // ❌ bloquea domingos
        }
    ]
});

flatpickr("#hora", {
    locale: "es",
    enableTime: true,
    noCalendar: true,
    dateFormat: "H:i", // ✅ formato que tu backend espera
    altInput: true,
    altFormat: "h:i K", // esto es solo visual
    time_24hr: false,
    minTime: "09:00",
    maxTime: "18:00"
});

</script>

</body>
</html>
